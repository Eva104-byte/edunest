<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduNest — Calendar & Goals</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--ink:#0f0e17;--cream:#fffcf5;--gold:#e8b84b;--sage:#3d6b5e;--border:#e8e4db;--card:#fff}
  body{background:#f5f3ef;font-family:'DM Sans',sans-serif;color:var(--ink);min-height:100vh}
  nav{background:var(--ink);padding:0 32px;display:flex;align-items:center;gap:16px;height:60px;position:sticky;top:0;z-index:100}
  .back{color:rgba(255,255,255,.6);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;transition:all .2s}
  .back:hover{background:rgba(255,255,255,.1);color:white}
  .nav-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:white;margin-right:auto}
  .btn{padding:10px 18px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none}
  .btn-dark{background:var(--ink);color:white}
  .btn-dark:hover{background:#2a2930}
  .btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--ink)}
  .btn-ghost:hover{border-color:var(--ink)}
  .btn-gold{background:var(--gold);color:var(--ink)}
  .btn-gold:hover{background:#d4a53a}
  
  .layout{max-width:1400px;margin:0 auto;padding:32px;display:grid;grid-template-columns:1fr 350px;gap:28px}
  .panel{background:var(--card);border-radius:18px;border:1.5px solid var(--border);overflow:hidden}
  .panel-header{padding:22px 26px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .panel-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
  
  /* Calendar */
  .cal-nav{display:flex;align-items:center;gap:16px}
  .cal-nav .month{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;min-width:200px;text-align:center}
  .nav-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:white;
    cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s}
  .nav-btn:hover{background:var(--ink);color:white;border-color:var(--ink)}
  .cal-grid{padding:16px 20px 20px}
  .cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
  .cal-days-header div{text-align:center;font-size:11px;font-weight:700;color:#aaa;
    text-transform:uppercase;letter-spacing:.8px;padding:6px 0}
  .cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-day{min-height:80px;padding:8px;border-radius:10px;border:1.5px solid transparent;
    cursor:pointer;transition:all .2s;background:#fafaf8;position:relative}
  .cal-day:hover{border-color:var(--sage);background:#f0f7f5}
  .cal-day.today{border-color:var(--gold)!important;background:#fef9e7}
  .cal-day.other-month .day-num{color:#ccc}
  .cal-day.selected{border-color:var(--ink)!important;background:#f0eee8}
  .day-num{font-size:13px;font-weight:600;margin-bottom:4px}
  .day-events{display:flex;flex-direction:column;gap:2px}
  .day-event-dot{font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;font-weight:500}
  
  /* Right sidebar */
  .side-stack{display:flex;flex-direction:column;gap:20px}
  
  /* Selected day events */
  .event-list{padding:14px 20px;display:flex;flex-direction:column;gap:10px;max-height:280px;overflow-y:auto}
  .event-item{border-left:3px solid;padding:10px 14px;border-radius:0 10px 10px 0;background:#fafaf8}
  .event-title{font-weight:600;font-size:14px;margin-bottom:3px}
  .event-meta{font-size:12px;color:#888}
  .event-actions{display:flex;gap:6px;margin-top:8px}
  .ev-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:white;transition:all .2s}
  .ev-btn:hover{background:#f5f3ef}
  .ev-btn.del{border-color:#fca5a5;color:#b91c1c}
  .ev-btn.del:hover{background:#fde8e9}
  
  /* Goals */
  .goals-list{padding:14px 20px;display:flex;flex-direction:column;gap:12px;max-height:400px;overflow-y:auto}
  .goal-item{border:1.5px solid var(--border);border-radius:12px;padding:14px 16px}
  .goal-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
  .goal-title{font-weight:600;font-size:14px}
  .goal-date{font-size:11px;color:#888;margin-top:2px}
  .goal-desc{font-size:12px;color:#666;margin-bottom:10px;line-height:1.5}
  .progress-wrap{margin-bottom:8px}
  .progress-label{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:4px}
  .progress-bar{height:6px;background:#f0ece4;border-radius:10px;overflow:hidden}
  .progress-fill{height:100%;background:var(--sage);border-radius:10px;transition:width .4s}
  .progress-fill.completed{background:var(--gold)}
  .progress-input{width:60px;padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;
    font-size:12px;text-align:center;outline:none}
  .goal-actions{display:flex;gap:6px;flex-wrap:wrap}
  .g-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;
    border:1.5px solid var(--border);background:white;transition:all .2s}
  .g-btn:hover{background:#f5f3ef}
  .g-btn.del{border-color:#fca5a5;color:#b91c1c}
  .g-btn.del:hover{background:#fde8e9}
  .g-btn.done{border-color:#6ee7b7;color:#065f46}
  .g-btn.done:hover{background:#e8f4f1}
  
  /* Modal */
  .modal{position:fixed;inset:0;background:rgba(15,14,23,0.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
  .modal.open{display:flex}
  .modal-box{background:white;border-radius:20px;padding:36px;width:100%;max-width:460px;box-shadow:0 40px 80px rgba(0,0,0,0.2)}
  .modal-box h3{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:20px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:11px;font-weight:600;color:#555;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
  .field input,.field textarea,.field select{width:100%;padding:11px 14px;border:1.5px solid var(--border);
    border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:white;outline:none;transition:all .2s;resize:vertical}
  .field input:focus,.field textarea:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(15,14,23,0.06)}
  .field textarea{min-height:80px}
  .color-picker{display:flex;gap:8px;flex-wrap:wrap}
  .color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:all .2s;border:2px solid transparent}
  .color-swatch.selected{border-color:var(--ink);transform:scale(1.2)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .tabs{display:flex;gap:8px;padding:16px 20px;border-bottom:1.5px solid var(--border)}
  .tab-pill{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;
    border:1.5px solid var(--border);background:white;transition:all .2s}
  .tab-pill.active{background:var(--ink);color:white;border-color:var(--ink)}
  .empty-state{text-align:center;padding:30px;color:#aaa;font-size:13px}

  @media(max-width:1000px){.layout{grid-template-columns:1fr;padding:16px}}

[data-theme="dark"] body{background:#0d1117;color:#e2e8f0}
[data-theme="dark"] .panel,[data-theme="dark"] .info-card,[data-theme="dark"] .todo-panel,
[data-theme="dark"] .pomodoro,[data-theme="dark"] .add-link-bar,
[data-theme="dark"] .modal-box,[data-theme="dark"] .editor-box{background:#161b22;border-color:#30363d;color:#e2e8f0}
[data-theme="dark"] .panel-header,[data-theme="dark"] .pom-header,[data-theme="dark"] .panel-title{border-color:#30363d;color:#e2e8f0}
[data-theme="dark"] .field input,[data-theme="dark"] .field select,[data-theme="dark"] .field textarea{background:#21262d;border-color:#30363d;color:#e2e8f0}
[data-theme="dark"] .filter-btn,[data-theme="dark"] .task-item,[data-theme="dark"] .trans-item,
[data-theme="dark"] .file-item,[data-theme="dark"] .file-card,[data-theme="dark"] .todo-item,
[data-theme="dark"] .event-item,[data-theme="dark"] .goal-item,[data-theme="dark"] .budget-item{background:#21262d;border-color:#30363d;color:#e2e8f0}
[data-theme="dark"] .app-desc,[data-theme="dark"] .trans-meta,[data-theme="dark"] .note-date,
[data-theme="dark"] .file-meta,[data-theme="dark"] .file-size{color:#8b949e}
[data-theme="dark"] .drop-zone{background:#161b22;border-color:#30363d}
[data-theme="dark"] .drop-zone:hover{background:#21262d}
[data-theme="dark"] .add-task-row input,[data-theme="dark"] .add-task-row select{background:#21262d;border-color:#30363d;color:#e2e8f0}
[data-theme="dark"] nav{background:#010409}

</style>
</head>
<body>
<nav>
  <a href="portal.html" class="back">← Dashboard</a>
  <div class="nav-title">📅 Calendar & Goals</div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-gold" onclick="openEventModal()">+ Event</button>
    <button class="btn btn-dark" onclick="openGoalModal()">+ Goal</button>
  </div>
<button class="theme-toggle" onclick="EduTheme.toggle()" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;padding:7px 14px;border-radius:8px;font-family:DM Sans,sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-left:auto">🌙 Dark</button>
</nav>

<div class="layout">
  <!-- Calendar -->
  <div>
    <div class="panel">
      <div class="panel-header">
        <div class="cal-nav">
          <button class="nav-btn" onclick="changeMonth(-1)">←</button>
          <div class="month" id="monthLabel">Loading...</div>
          <button class="nav-btn" onclick="changeMonth(1)">→</button>
        </div>
        <div style="font-size:13px;color:#888" id="eventCount">0 events</div>
      </div>
      <div class="cal-grid">
        <div class="cal-days-header">
          <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div class="cal-days" id="calDays"></div>
      </div>
    </div>
  </div>
  
  <!-- Sidebar -->
  <div class="side-stack">
    <!-- Selected day -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Events — <span id="selectedDayLabel">Today</span></div>
      </div>
      <div class="event-list" id="dayEvents">
        <div class="empty-state">Click a day to see events</div>
      </div>
    </div>
    
    <!-- Goals -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">My Goals</div>
        <span style="font-size:12px;color:#888" id="goalCount">0 goals</span>
      </div>
      <div class="tabs">
        <button class="tab-pill active" onclick="setGoalFilter('active',this)">Active</button>
        <button class="tab-pill" onclick="setGoalFilter('completed',this)">Completed</button>
        <button class="tab-pill" onclick="setGoalFilter('all',this)">All</button>
      </div>
      <div class="goals-list" id="goalsList">
        <div class="empty-state">No goals yet. Set your first goal!</div>
      </div>
    </div>
  </div>
</div>

<!-- Event Modal -->
<div class="modal" id="eventModal">
  <div class="modal-box">
    <h3 id="eventModalTitle">New Event</h3>
    <input type="hidden" id="editEventId">
    <div class="field"><label>Event Title *</label><input type="text" id="evTitle" placeholder="e.g. Exam, Assignment deadline"></div>
    <div class="field"><label>Description</label><textarea id="evDesc" placeholder="Add notes..."></textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="field"><label>Date *</label><input type="date" id="evDate"></div>
      <div class="field"><label>Time</label><input type="time" id="evTime"></div>
    </div>
    <div class="field"><label>Repeat</label>
      <select id="evRecur">
        <option value="">No repeat</option>
        <option value="weekly">Every week</option>
        <option value="biweekly">Every 2 weeks</option>
        <option value="monthly">Every month</option>
      </select>
    </div>
    <div class="field"><label>Colour</label>
      <div class="color-picker" id="evColorPicker">
        <div class="color-swatch selected" style="background:#4f46e5" data-color="#4f46e5" onclick="selectColor('#4f46e5',this)"></div>
        <div class="color-swatch" style="background:#059669" data-color="#059669" onclick="selectColor('#059669',this)"></div>
        <div class="color-swatch" style="background:#d97706" data-color="#d97706" onclick="selectColor('#d97706',this)"></div>
        <div class="color-swatch" style="background:#dc2626" data-color="#dc2626" onclick="selectColor('#dc2626',this)"></div>
        <div class="color-swatch" style="background:#7c3aed" data-color="#7c3aed" onclick="selectColor('#7c3aed',this)"></div>
        <div class="color-swatch" style="background:#0891b2" data-color="#0891b2" onclick="selectColor('#0891b2',this)"></div>
        <div class="color-swatch" style="background:#db2777" data-color="#db2777" onclick="selectColor('#db2777',this)"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeEventModal()">Cancel</button>
      <button class="btn btn-dark" onclick="saveEvent()">Save Event</button>
    </div>
  </div>
</div>

<!-- Goal Modal -->
<div class="modal" id="goalModal">
  <div class="modal-box">
    <h3 id="goalModalTitle">New Goal</h3>
    <input type="hidden" id="editGoalId">
    <div class="field"><label>Goal Title *</label><input type="text" id="goalTitle" placeholder="e.g. Finish dissertation, Get a B+ average"></div>
    <div class="field"><label>Description</label><textarea id="goalDesc" placeholder="What steps will you take?"></textarea></div>
    <div class="field"><label>Target Date</label><input type="date" id="goalTarget"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeGoalModal()">Cancel</button>
      <button class="btn btn-dark" onclick="saveGoal()">Save Goal</button>
    </div>
  </div>
</div>

<script>
  let currentMonth = new Date().getFullYear()+'-'+(String(new Date().getMonth()+1).padStart(2,'0'));
  let events = [], goals = [], selectedDate = null, selectedColor = '#4f46e5', goalFilter = 'active';
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  async function init() {
    await Promise.all([loadEvents(), loadGoals()]);
    renderCalendar();
    selectDay(new Date().toISOString().slice(0,10));
  }

  async function loadEvents() {
    try {
      const r = await fetch('calendar_api.php?action=get_events&month='+currentMonth);
      const d = await r.json();
      if(d.success) events = d.events;
    } catch(e){}
  }

  async function loadGoals() {
    try {
      const r = await fetch('calendar_api.php?action=get_goals');
      const d = await r.json();
      if(d.success) { goals = d.goals; renderGoals(); }
    } catch(e){}
  }

  function changeMonth(dir) {
    const [y,m] = currentMonth.split('-').map(Number);
    const d = new Date(y,m-1+dir,1);
    currentMonth = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    loadEvents().then(renderCalendar);
  }

  function renderCalendar() {
    const [y,m] = currentMonth.split('-').map(Number);
    document.getElementById('monthLabel').textContent = months[m-1]+' '+y;
    const firstDay = new Date(y,m-1,1).getDay();
    const daysInMonth = new Date(y,m,0).getDate();
    const daysInPrev = new Date(y,m-1,0).getDate();
    const today = new Date().toISOString().slice(0,10);
    let html = '';
    // Prev month days
    for(let i=firstDay-1;i>=0;i--) {
      html += `<div class="cal-day other-month"><div class="day-num">${daysInPrev-i}</div></div>`;
    }
    // This month
    for(let d=1;d<=daysInMonth;d++) {
      const dateStr = y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const dayEvents = events.filter(e=>e.event_date===dateStr);
      const isToday = dateStr===today;
      const isSelected = dateStr===selectedDate;
      html += `<div class="cal-day ${isToday?'today':''} ${isSelected?'selected':''}" onclick="selectDay('${dateStr}')">
        <div class="day-num">${d}</div>
        <div class="day-events">
          ${dayEvents.slice(0,3).map(e=>`<div class="day-event-dot" style="background:${e.color}22;color:${e.color}">${escHtml(e.title)}</div>`).join('')}
          ${dayEvents.length>3?`<div style="font-size:10px;color:#aaa">+${dayEvents.length-3} more</div>`:''}
        </div>
      </div>`;
    }
    document.getElementById('calDays').innerHTML = html;
    document.getElementById('eventCount').textContent = events.length + ' events this month';
  }

  function selectDay(date) {
    selectedDate = date;
    renderCalendar();
    const dayEvs = events.filter(e=>e.event_date===date);
    const d = new Date(date+'T00:00:00');
    document.getElementById('selectedDayLabel').textContent = d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    const list = document.getElementById('dayEvents');
    if(!dayEvs.length) { list.innerHTML='<div class="empty-state">No events on this day.<br><a href="#" onclick="openEventModalForDate(\''+date+'\')" style="color:var(--sage)">+ Add event</a></div>'; return; }
    list.innerHTML = dayEvs.map(e=>`
      <div class="event-item" style="border-left-color:${e.color}">
        <div class="event-title">${escHtml(e.title)}</div>
        <div class="event-meta">${e.event_time?'⏰ '+formatTime(e.event_time):'All day'}${e.description?' · '+escHtml(e.description):''}</div>
        <div class="event-actions">
          <button class="ev-btn" onclick="editEvent(${e.id})">Edit</button>
          <button class="ev-btn del" onclick="deleteEvent(${e.id})">Delete</button>
        </div>
      </div>`).join('');
  }

  function openEventModal(eventId=null) {
    document.getElementById('editEventId').value=eventId||'';
    if(eventId) {
      const e=events.find(ev=>ev.id==eventId);
      document.getElementById('eventModalTitle').textContent='Edit Event';
      document.getElementById('evTitle').value=e.title;
      document.getElementById('evDesc').value=e.description||'';
      document.getElementById('evDate').value=e.event_date;
      document.getElementById('evTime').value=e.event_time||'';
      selectColor(e.color||'#4f46e5');
    } else {
      document.getElementById('eventModalTitle').textContent='New Event';
      document.getElementById('evTitle').value='';
      document.getElementById('evDesc').value='';
      document.getElementById('evDate').value=selectedDate||new Date().toISOString().slice(0,10);
      document.getElementById('evTime').value='';
      selectColor('#4f46e5');
    }
    document.getElementById('eventModal').classList.add('open');
  }

  function openEventModalForDate(date) { selectedDate=date; openEventModal(); return false; }
  function editEvent(id) { openEventModal(id); }
  function closeEventModal() { document.getElementById('eventModal').classList.remove('open'); }

  function selectColor(color, el) {
    selectedColor = color;
    document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
    const target = el || document.querySelector(`.color-swatch[data-color="${color}"]`);
    if(target) target.classList.add('selected');
  }

  async function saveEvent() {
    const id = document.getElementById('editEventId').value;
    const title = document.getElementById('evTitle').value.trim();
    const date = document.getElementById('evDate').value;
    const recur = document.getElementById('evRecur')?.value || '';
    if(!title||!date){alert('Title and date required');return;}
    const fd=new FormData();
    fd.append('action',id?'update_event':'add_event');
    if(id) fd.append('id',id);
    fd.append('title',title); fd.append('description',document.getElementById('evDesc').value);
    fd.append('event_date',date); fd.append('event_time',document.getElementById('evTime').value);
    fd.append('color',selectedColor);
    const r=await fetch('calendar_api.php',{method:'POST',body:fd});
    const d=await r.json();
    if(d.success){
      // Create recurring occurrences (8 forward)
      if(recur && !id){
        const extras=getRecurDates(date,recur,8);
        for(const ed of extras){
          const fd2=new FormData(); fd2.append('action','add_event');
          fd2.append('title',title+' (recurring)');
          fd2.append('description',document.getElementById('evDesc').value);
          fd2.append('event_date',ed);
          fd2.append('event_time',document.getElementById('evTime').value);
          fd2.append('color',selectedColor);
          await fetch('calendar_api.php',{method:'POST',body:fd2});
        }
      }
      closeEventModal();await loadEvents();renderCalendar();if(selectedDate)selectDay(selectedDate);
    } else alert(d.message||'Error');
  }

  function getRecurDates(startDate, type, count){
    const dates=[]; const base=new Date(startDate+'T00:00:00');
    for(let i=1;i<=count;i++){
      const nd=new Date(base);
      if(type==='weekly') nd.setDate(nd.getDate()+7*i);
      else if(type==='biweekly') nd.setDate(nd.getDate()+14*i);
      else if(type==='monthly') nd.setMonth(nd.getMonth()+i);
      dates.push(nd.toISOString().slice(0,10));
    }
    return dates;
  }

  async function deleteEvent(id) {
    if(!confirm('Delete this event?'))return;
    const fd=new FormData(); fd.append('action','delete_event'); fd.append('id',id);
    const r=await fetch('calendar_api.php',{method:'POST',body:fd});
    const d=await r.json();
    if(d.success){await loadEvents();renderCalendar();if(selectedDate)selectDay(selectedDate);}
  }

  function openGoalModal(goalId=null) {
    document.getElementById('editGoalId').value=goalId||'';
    if(goalId){
      const g=goals.find(g=>g.id==goalId);
      document.getElementById('goalModalTitle').textContent='Edit Goal';
      document.getElementById('goalTitle').value=g.title;
      document.getElementById('goalDesc').value=g.description||'';
      document.getElementById('goalTarget').value=g.target_date||'';
    } else {
      document.getElementById('goalModalTitle').textContent='New Goal';
      document.getElementById('goalTitle').value=''; document.getElementById('goalDesc').value='';
      document.getElementById('goalTarget').value='';
    }
    document.getElementById('goalModal').classList.add('open');
  }
  function closeGoalModal(){document.getElementById('goalModal').classList.remove('open');}

  async function saveGoal(){
    const id=document.getElementById('editGoalId').value;
    const title=document.getElementById('goalTitle').value.trim();
    if(!title){alert('Title required');return;}
    const fd=new FormData();
    fd.append('action',id?'update_goal':'add_goal');
    if(id) fd.append('id',id);
    fd.append('title',title); fd.append('description',document.getElementById('goalDesc').value);
    fd.append('target_date',document.getElementById('goalTarget').value);
    if(id){const g=goals.find(g=>g.id==id); fd.append('progress',g.progress); fd.append('status',g.status);}
    const r=await fetch('calendar_api.php',{method:'POST',body:fd});
    const d=await r.json();
    if(d.success){closeGoalModal();await loadGoals();}else alert(d.message);
  }

  async function updateGoalProgress(id, progress) {
    const g=goals.find(g=>g.id==id); if(!g)return;
    const fd=new FormData(); fd.append('action','update_goal'); fd.append('id',id);
    fd.append('title',g.title); fd.append('description',g.description||'');
    fd.append('target_date',g.target_date||''); fd.append('progress',progress);
    fd.append('status',progress>=100?'completed':g.status);
    await fetch('calendar_api.php',{method:'POST',body:fd});
    g.progress=progress; if(progress>=100)g.status='completed';
    renderGoals();
  }

  async function completeGoal(id) {
    const g=goals.find(g=>g.id==id); if(!g)return;
    const fd=new FormData(); fd.append('action','update_goal'); fd.append('id',id);
    fd.append('title',g.title); fd.append('description',g.description||'');
    fd.append('target_date',g.target_date||''); fd.append('progress',100); fd.append('status','completed');
    await fetch('calendar_api.php',{method:'POST',body:fd});
    g.progress=100; g.status='completed'; renderGoals();
  }

  async function deleteGoal(id) {
    if(!confirm('Delete this goal?'))return;
    const fd=new FormData(); fd.append('action','delete_goal'); fd.append('id',id);
    const r=await fetch('calendar_api.php',{method:'POST',body:fd});
    const d=await r.json();
    if(d.success){goals=goals.filter(g=>g.id!=id);renderGoals();}
  }

  function setGoalFilter(f,btn){goalFilter=f;document.querySelectorAll('.tab-pill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderGoals();}

  function renderGoals(){
    let filtered=goals;
    if(goalFilter!=='all') filtered=goals.filter(g=>g.status===goalFilter);
    document.getElementById('goalCount').textContent=goals.length+' goal'+(goals.length!==1?'s':'');
    const list=document.getElementById('goalsList');
    if(!filtered.length){list.innerHTML='<div class="empty-state">No '+goalFilter+' goals.</div>';return;}
    list.innerHTML=filtered.map(g=>`
      <div class="goal-item">
        <div class="goal-top">
          <div>
            <div class="goal-title">${escHtml(g.title)}</div>
            ${g.target_date?`<div class="goal-date">🎯 Target: ${formatDate(g.target_date)}</div>`:''}
          </div>
          <span style="font-size:18px">${g.status==='completed'?'✅':g.status==='abandoned'?'❌':'🔥'}</span>
        </div>
        ${g.description?`<div class="goal-desc">${escHtml(g.description)}</div>`:''}
        <div class="progress-wrap">
          <div class="progress-label"><span>Progress</span><span>${g.progress}%</span></div>
          <div class="progress-bar"><div class="progress-fill ${g.status==='completed'?'completed':''}" style="width:${g.progress}%"></div></div>
        </div>
        <div class="goal-actions">
          <input type="number" class="progress-input" value="${g.progress}" min="0" max="100" onchange="updateGoalProgress(${g.id},this.value)" title="Update progress %">
          <button class="g-btn" onclick="openGoalModal(${g.id})">Edit</button>
          ${g.status!=='completed'?`<button class="g-btn done" onclick="completeGoal(${g.id})">✓ Done</button>`:''}
          <button class="g-btn del" onclick="deleteGoal(${g.id})">Delete</button>
        </div>
      </div>`).join('');
  }

  function escHtml(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}
  function formatDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
  function formatTime(t){const[h,m]=t.split(':');const hr=parseInt(h);return `${hr%12||12}:${m} ${hr>=12?'PM':'AM'}`;}
  document.getElementById('eventModal').addEventListener('click',e=>{if(e.target.classList.contains('modal'))closeEventModal();});
  document.getElementById('goalModal').addEventListener('click',e=>{if(e.target.classList.contains('modal'))closeGoalModal();});

  init();
</script>
<script src="theme.js"></script>
<script src="notifications.js"></script>
<script src="offline.js"></script>
</body>
</html>
